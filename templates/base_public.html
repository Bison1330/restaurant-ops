<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bison Stockyard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #1f1f1f;
            --text: #e8e8e8;
            --text-muted: #666;
            --accent: #3ddc84;
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; }
        .form-control, .form-select {
            background: #1a1a1a;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
        }
        .form-control:focus, .form-select:focus {
            background: #1a1a1a;
            border-color: var(--accent);
            color: var(--text);
            box-shadow: 0 0 0 2px rgba(61,220,132,0.15);
        }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #34c476;
            border-color: #34c476;
            color: #000;
        }
        .alert-info { background: rgba(61,220,132,0.1); border-color: rgba(61,220,132,0.2); color: var(--text); }
        .alert-danger { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: #fca5a5; }
        .alert-warning { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.2); color: #fcd34d; }
    </style>
</head>
<body>
{% block content %}{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.js/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
